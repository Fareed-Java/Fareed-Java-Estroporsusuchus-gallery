<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paintings - Estroporsusuchus Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-top">
        <div class="header-container">
            <div class="logo">🦕</div>
            <div class="audio-control">
                <audio id="background-music" controls>
                    <source src="media/last summer whisper .mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <div class="audio-actions">
                    <button id="music-toggle" type="button">Play Music</button>
                    <button id="prev-track" type="button">Prev</button>
                    <button id="next-track" type="button">Next</button>
                    <button id="random-track" type="button">Random Track</button>
                    <label class="upload-label">
                        Upload song
                        <input id="upload-track" type="file" accept="audio/*" multiple title="Upload audio files" />
                    </label>
                </div>
            </div>
        </div>
    </header>
    
    <main id="paintings">
        <section id="paintings-gallery" class="gallery-section">
            <h2 style="text-align: center;">Paintings</h2>
            <p>A curated collection of artwork featuring adventure of furina the Regina of All Waters with dinosaurs, marine reptiles, and other fascinating creatures from Earth's ancient past.</p>
            <div class="gallery-grid"></div>
            <button class="load-more">Load More</button>
        </section>
    </main>
    
    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-image" src="" alt="">
        <div class="lightbox-info"></div>
    </div>
    <footer>
        <p>All website content © Your Name.</p>
        <div class="social-links">
            <a href="#">Bluesky</a>
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Amazon</a>
            <a href="#">Patreon</a>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
